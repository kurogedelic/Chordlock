<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAssembly Canonical Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .pass { background: #d4edda; border-color: #c3e6cb; }
        .fail { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>WebAssembly Canonical Naming Test</h1>
    <button onclick="runTests()">Run Tests</button>
    <div id="status">Loading...</div>
    <div id="results"></div>

    <script src="web/chordlock.js"></script>
    <script>
        let chordlock = null;
        let moduleLoaded = false;

        ChordlockModule().then(function(Module) {
            chordlock = Module;
            Module.ccall('chordlock_init', null, [], []);
            moduleLoaded = true;
            document.getElementById('status').textContent = 'Ready to test!';
        }).catch(function(err) {
            document.getElementById('status').textContent = 'Failed to load: ' + err;
        });

        function runTests() {
            if (!moduleLoaded) {
                alert('Module not loaded yet');
                return;
            }

            const results = document.getElementById('results');
            results.innerHTML = '';

            const tests = [
                { input: 'CM7', expected: 'Cmaj7' },
                { input: 'Cmaj7', expected: 'Cmaj7' },
                { input: 'C+', expected: 'Caug' },
                { input: 'Caug', expected: 'Caug' },
                { input: 'C°', expected: 'Cdim' },
                { input: 'Cdim', expected: 'Cdim' }
            ];

            let passed = 0;
            let total = tests.length;

            tests.forEach(test => {
                const result = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', ['string', 'number'], [test.input, 4]);
                const data = JSON.parse(result);
                
                const div = document.createElement('div');
                div.className = 'test';
                
                const isPass = data.chord === test.expected;
                if (isPass) {
                    div.classList.add('pass');
                    passed++;
                } else {
                    div.classList.add('fail');
                }
                
                div.innerHTML = `
                    <strong>${isPass ? '✅ PASS' : '❌ FAIL'}</strong><br>
                    Input: ${test.input}<br>
                    Expected: ${test.expected}<br>
                    Got: ${data.chord}<br>
                    Full result: ${result}
                `;
                
                results.appendChild(div);
            });

            const summary = document.createElement('div');
            summary.className = 'test';
            summary.classList.add(passed === total ? 'pass' : 'fail');
            summary.innerHTML = `<h2>Summary: ${passed}/${total} tests passed</h2>`;
            results.appendChild(summary);
        }
    </script>
</body>
</html>
