<!DOCTYPE html>
<html>
<head>
    <title>Simple WebAssembly Canonical Test</title>
</head>
<body>
    <h1>Simple WebAssembly Canonical Naming Test</h1>
    <div id="results"></div>
    
    <script src="web/chordlock.js"></script>
    <script>
        const results = document.getElementById('results');
        
        function testCanonical() {
            try {
                console.log('Testing canonical naming...');
                
                // Test CM7
                const cm7Result = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', ['string', 'number'], ['CM7', 4]);
                console.log('CM7 result:', cm7Result);
                
                // Test Cmaj7
                const cmaj7Result = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', ['string', 'number'], ['Cmaj7', 4]);
                console.log('Cmaj7 result:', cmaj7Result);
                
                results.innerHTML = `
                    <p><strong>CM7:</strong> ${cm7Result}</p>
                    <p><strong>Cmaj7:</strong> ${cmaj7Result}</p>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                results.innerHTML = `<p style="color: red;">Error: ${error}</p>`;
            }
        }
        
        let chordlock = null;
        
        ChordlockModule().then(function(Module) {
            chordlock = Module;
            Module.ccall('chordlock_init', null, [], []);
            results.innerHTML = '<p style="color: green;">WebAssembly loaded successfully!</p>';
            
            // Wait a moment then test
            setTimeout(testCanonical, 100);
            
        }).catch(function(err) {
            console.error('Failed to load WebAssembly:', err);
            results.innerHTML = `<p style="color: red;">Failed to load WebAssembly: ${err}</p>`;
        });
    </script>
</body>
</html>
