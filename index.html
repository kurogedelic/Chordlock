<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Chordlock Demo</title>

		<style>
			.white-key {
				background: white;
				border: 1px solid #aaa;
				z-index: 1;
			}

			.black-key {
				background: black;
				position: absolute;
				top: 0;
				left: 40px;
				z-index: 2;
			}
		</style>
	</head>
	<body>
		<h1>🔍 Chordlock</h1>
		<div style="margin-bottom: 10px;">
			<input type="checkbox" id="onChordToggle" checked>
			<label for="onChordToggle">Detect slash chords</label>
		</div>
		<p id="chord">Waiting for MIDI input...</p>
		<div
			id="keyboard"
			style="position: relative; width: 280px; height: 100px; margin-top: 1em"
		></div>

		<script src="chordlock.js"></script>
		<script src="main.js"></script>
	</body>
</html>
