<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordLock - Chord Identification Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .demo-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin: 5px;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .button.secondary {
            background: #f8f9fa;
            color: #555;
            border: 2px solid #e1e5e9;
        }
        
        .presets {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        
        .preset-btn {
            background: #f8f9fa;
            border: 2px solid #e1e5e9;
            color: #555;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .preset-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .result {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
            border-left: 4px solid #667eea;
        }
        
        .result h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .chord-name {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e1e5e9;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            font-weight: 500;
            color: #666;
        }
        
        .result-value {
            font-weight: 600;
            color: #333;
        }
        
        .footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 40px;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 ChordLock</h1>
            <p>Ultra-fast chord identification from MIDI notes</p>
        </div>
        
        <div class="demo-card">
            <div class="input-group">
                <label for="midi-notes">MIDI Notes (comma-separated)</label>
                <input type="text" id="midi-notes" placeholder="60,64,67" value="60,64,67">
            </div>
            
            <div class="presets">
                <button class="preset-btn" onclick="setNotes('60,64,67')">C Major</button>
                <button class="preset-btn" onclick="setNotes('60,63,67')">C Minor</button>
                <button class="preset-btn" onclick="setNotes('60,64,67,70')">C7</button>
                <button class="preset-btn" onclick="setNotes('60,64,67,71')">CMaj7</button>
                <button class="preset-btn" onclick="setNotes('60,63,67,70')">Cm7</button>
                <button class="preset-btn" onclick="setNotes('64,67,72')">C/E</button>
                <button class="preset-btn" onclick="setNotes('67,72,76')">C/G</button>
                <button class="preset-btn" onclick="setNotes('62,66,69')">D Major</button>
            </div>
            
            <button class="button" onclick="identifyChord()">🔍 Identify Chord</button>
            <button class="button secondary" onclick="clearResult()">Clear</button>
            
            <div id="result" class="result" style="display: none;">
                <h3>🎹 Chord Identification Result</h3>
                <div class="chord-name" id="chord-name">-</div>
                <div class="result-item">
                    <span class="result-label">Input Notes:</span>
                    <span class="result-value" id="input-notes">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Note Names:</span>
                    <span class="result-value" id="note-names">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Intervals:</span>
                    <span class="result-value" id="intervals">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Confidence:</span>
                    <span class="result-value" id="confidence">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Processing Time:</span>
                    <span class="result-value" id="processing-time">-</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by <a href="https://github.com/kurogedelic/ChordLock" target="_blank">ChordLock</a> - 
            Ultra-fast chord identification engine</p>
            <p>© 2024-2025 Leo Kuroshita (@kurogedelic)</p>
        </div>
    </div>

    <script src="chordlock.js"></script>
</body>
</html>
