<!DOCTYPE html>
<html>
<head>
    <title>WASM Test - Fresh Build</title>
</head>
<body>
    <h1>WebAssembly Test - Fresh Build</h1>
    <p>Testing C-E-G-B chord detection with fresh WASM...</p>
    <div id="result"></div>
    
    <script src="chordlock_1751336884.js"></script>
    <script>
        ChordlockModule().then(function(Module) {
            console.log('Fresh Chordlock loaded');
            
            // Initialize
            Module.ccall('chordlock_init', null, [], []);
            
            // Add notes C-E-G-B (60,64,67,71)
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [60, 80]);
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [64, 80]);
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [67, 80]);
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [71, 80]);
            
            // Detect chord
            const result = Module.ccall('chordlock_detect_chord_detailed', 'string', ['number'], [5]);
            console.log('Fresh detection result:', result);
            
            const parsed = JSON.parse(result);
            const topChord = parsed.chord;
            const topConfidence = parsed.confidence;
            
            document.getElementById('result').innerHTML = `
                <h2>Result:</h2>
                <p><strong>Top Chord:</strong> ${topChord}</p>
                <p><strong>Confidence:</strong> ${topConfidence}</p>
                <p><strong>Expected:</strong> Cmaj7 with confidence > 0.7</p>
                <pre>${result}</pre>
            `;
            
            // Clean up
            Module.ccall('chordlock_cleanup', null, [], []);
        }).catch(function(err) {
            console.error('Failed to load Fresh Chordlock:', err);
            document.getElementById('result').innerHTML = 'Error: ' + err;
        });
    </script>
</body>
</html>
