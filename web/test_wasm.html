<!DOCTYPE html>
<html>
<head>
    <title>WASM Test</title>
</head>
<body>
    <h1>WebAssembly Test</h1>
    <p>Testing C-E-G-B chord detection...</p>
    <div id="result"></div>
    
    <script src="chordlock.js?v=1751336417"></script>
    <script>
        ChordlockModule().then(function(Module) {
            console.log('Chordlock loaded');
            
            // Initialize
            Module.ccall('chordlock_init', null, [], []);
            
            // Add notes C-E-G-B (60,64,67,71)
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [60, 80]);
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [64, 80]);
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [67, 80]);
            Module.ccall('chordlock_note_on', null, ['number', 'number'], [71, 80]);
            
            // Detect chord
            const result = Module.ccall('chordlock_detect_chord_detailed', 'string', ['number'], [5]);
            console.log('Detection result:', result);
            
            document.getElementById('result').innerHTML = '<pre>' + result + '</pre>';
            
            // Clean up
            Module.ccall('chordlock_cleanup', null, [], []);
        }).catch(function(err) {
            console.error('Failed to load Chordlock:', err);
            document.getElementById('result').innerHTML = 'Error: ' + err;
        });
    </script>
</body>
</html>
