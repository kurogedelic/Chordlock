<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chordlock WebAssembly Reverse Lookup Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            line-height: 1.6;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .test-section {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            border-left: 4px solid #ffd700;
        }
        .test-result {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #ffd700;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ff6b6b;
        }
        .success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #51cf66;
        }
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Chordlock WebAssembly Reverse Lookup Test</h1>
        
        <div id="loading" class="loading">
            Loading WebAssembly module...
        </div>
        
        <div id="content" style="display: none;">
            <div class="test-section">
                <h3>🎯 Basic Chord Tests</h3>
                <button onclick="testBasicChords()">Test Basic Chords</button>
                <div id="basic-results" class="test-result"></div>
            </div>
            
            <div class="test-section">
                <h3>🔧 Theoretical Calculation Tests</h3>
                <button onclick="testTheoreticalChords()">Test Sus4, Power Chords, Aug</button>
                <div id="theoretical-results" class="test-result"></div>
            </div>
            
            <div class="test-section">
                <h3>🎼 Complex Chord Tests</h3>
                <button onclick="testComplexChords()">Test Add9, Sharp Chords</button>
                <div id="complex-results" class="test-result"></div>
            </div>
            
            <div class="test-section">
                <h3>🔍 Similar Chord Suggestions</h3>
                <button onclick="testSimilarChords()">Test Similar Chord Names</button>
                <div id="similar-results" class="test-result"></div>
            </div>
            
            <div class="test-section">
                <h3>⚡ Performance Test</h3>
                <button onclick="testPerformance()">Run Performance Test</button>
                <div id="performance-results" class="test-result"></div>
            </div>
        </div>
    </div>

    <script src="chordlock.js"></script>
    <script>
        let chordlock = null;
        
        // Initialize the WebAssembly module
        ChordlockModule().then(function(Module) {
            chordlock = Module;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            // Initialize Chordlock
            Module.ccall('chordlock_init', 'number', [], []);
            console.log('Chordlock WebAssembly module loaded and initialized!');
        }).catch(function(error) {
            document.getElementById('loading').innerHTML = 
                '<div class="error">Failed to load WebAssembly module: ' + error + '</div>';
        });
        
        function testBasicChords() {
            const resultDiv = document.getElementById('basic-results');
            resultDiv.innerHTML = 'Testing basic chords...\n\n';
            
            const basicChords = ['C', 'Cmaj', 'Cm', 'C7', 'Cmaj7'];
            
            basicChords.forEach(chord => {
                try {
                    const jsonResult = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', 
                        ['string', 'number'], [chord, 4]);
                    resultDiv.innerHTML += `${chord}: ${jsonResult}\n`;
                } catch (error) {
                    resultDiv.innerHTML += `${chord}: ERROR - ${error}\n`;
                }
            });
            
            resultDiv.innerHTML += '\n✅ Basic chord tests completed!';
        }
        
        function testTheoreticalChords() {
            const resultDiv = document.getElementById('theoretical-results');
            resultDiv.innerHTML = 'Testing theoretical calculation chords...\n\n';
            
            const theoreticalChords = ['Csus4', 'Csus2', 'C5', 'Caug', 'Cdim'];
            
            theoreticalChords.forEach(chord => {
                try {
                    const jsonResult = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', 
                        ['string', 'number'], [chord, 4]);
                    resultDiv.innerHTML += `${chord}: ${jsonResult}\n`;
                } catch (error) {
                    resultDiv.innerHTML += `${chord}: ERROR - ${error}\n`;
                }
            });
            
            resultDiv.innerHTML += '\n✅ Theoretical chord tests completed!';
        }
        
        function testComplexChords() {
            const resultDiv = document.getElementById('complex-results');
            resultDiv.innerHTML = 'Testing complex chords...\n\n';
            
            const complexChords = ['Gadd9', 'F#m', 'C#7', 'F#aug', 'Dbmaj7'];
            
            complexChords.forEach(chord => {
                try {
                    const jsonResult = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', 
                        ['string', 'number'], [chord, 4]);
                    resultDiv.innerHTML += `${chord}: ${jsonResult}\n`;
                } catch (error) {
                    resultDiv.innerHTML += `${chord}: ERROR - ${error}\n`;
                }
            });
            
            resultDiv.innerHTML += '\n✅ Complex chord tests completed!';
        }
        
        function testSimilarChords() {
            const resultDiv = document.getElementById('similar-results');
            resultDiv.innerHTML = 'Testing similar chord suggestions...\n\n';
            
            const testInputs = ['F#', 'Csus', 'maj7'];
            
            testInputs.forEach(input => {
                try {
                    const jsonResult = chordlock.ccall('chordlock_find_similar_chord_names', 'string', 
                        ['string'], [input]);
                    const parsed = JSON.parse(jsonResult);
                    resultDiv.innerHTML += `"${input}" suggestions:\n`;
                    resultDiv.innerHTML += `  Found ${parsed.similar.length} matches: ${parsed.similar.slice(0, 10).join(', ')}\n\n`;
                } catch (error) {
                    resultDiv.innerHTML += `"${input}": ERROR - ${error}\n`;
                }
            });
            
            resultDiv.innerHTML += '\n✅ Similar chord tests completed!';
        }
        
        function testPerformance() {
            const resultDiv = document.getElementById('performance-results');
            resultDiv.innerHTML = 'Running performance test...\n\n';
            
            const testChords = ['C', 'Dm', 'Em', 'F', 'G', 'Am', 'Bdim', 'Cmaj7', 'Dm7', 'G7', 
                               'C5', 'Csus4', 'Caug', 'F#m', 'Gadd9'];
            const iterations = 1000;
            
            const startTime = performance.now();
            
            for (let i = 0; i < iterations; i++) {
                testChords.forEach(chord => {
                    chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', 
                        ['string', 'number'], [chord, 4]);
                });
            }
            
            const endTime = performance.now();
            const totalTime = endTime - startTime;
            const totalCalls = iterations * testChords.length;
            const avgTime = totalTime / totalCalls;
            
            resultDiv.innerHTML += `Total calls: ${totalCalls}\n`;
            resultDiv.innerHTML += `Total time: ${totalTime.toFixed(2)}ms\n`;
            resultDiv.innerHTML += `Average time per call: ${avgTime.toFixed(4)}ms\n`;
            resultDiv.innerHTML += `Throughput: ${(1000 / avgTime).toFixed(0)} calls/second\n\n`;
            resultDiv.innerHTML += '✅ Performance test completed!';
        }
    </script>
</body>
</html>
