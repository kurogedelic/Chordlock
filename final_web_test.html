<!DOCTYPE html>
<html>
<head>
    <title>Final WebAssembly Test - CM7 vs Cmaj7</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .pass { background: #d4edda; border-color: #c3e6cb; }
        .fail { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 10px 0; font-size: 16px; }
        .result { font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Final WebAssembly Test - CM7 vs Cmaj7 Canonical Naming</h1>
    <p>Testing if CM7 and Cmaj7 both return the canonical name "Cmaj7"</p>
    
    <button onclick="runTest()">🧪 Run Canonical Naming Test</button>
    <div id="status">Loading WebAssembly...</div>
    <div id="results"></div>

    <script src="web/chordlock.js"></script>
    <script>
        let chordlock = null;

        ChordlockModule().then(function(Module) {
            chordlock = Module;
            Module.ccall('chordlock_init', null, [], []);
            document.getElementById('status').innerHTML = '✅ WebAssembly loaded successfully!';
        }).catch(function(err) {
            document.getElementById('status').innerHTML = '❌ Failed to load WebAssembly: ' + err;
        });

        function runTest() {
            if (!chordlock) {
                alert('WebAssembly not loaded yet');
                return;
            }

            const results = document.getElementById('results');
            results.innerHTML = '<h2>Test Results:</h2>';

            const tests = [
                { input: 'CM7', expectedCanonical: 'Cmaj7', description: 'CM7 should return canonical name "Cmaj7"' },
                { input: 'Cmaj7', expectedCanonical: 'Cmaj7', description: 'Cmaj7 should return canonical name "Cmaj7"' },
                { input: 'C+', expectedCanonical: 'Caug', description: 'C+ should return canonical name "Caug"' },
                { input: 'C°', expectedCanonical: 'Cdim', description: 'C° should return canonical name "Cdim"' }
            ];

            let passed = 0;
            let total = tests.length;

            tests.forEach((test, index) => {
                try {
                    const result = chordlock.ccall('chordlock_chord_name_to_notes_json', 'string', ['string', 'number'], [test.input, 4]);
                    const data = JSON.parse(result);
                    
                    const div = document.createElement('div');
                    div.className = 'test';
                    
                    const isPass = data.chord === test.expectedCanonical;
                    if (isPass) {
                        div.classList.add('pass');
                        passed++;
                    } else {
                        div.classList.add('fail');
                    }
                    
                    div.innerHTML = `
                        <h3>${isPass ? '✅' : '❌'} Test ${index + 1}: ${test.input}</h3>
                        <p><strong>Description:</strong> ${test.description}</p>
                        <p><strong>Input:</strong> "${test.input}"</p>
                        <p><strong>Expected Canonical:</strong> "${test.expectedCanonical}"</p>
                        <p><strong>Actual Canonical:</strong> "${data.chord}"</p>
                        <p><strong>Original Input Field:</strong> "${data.input || 'N/A'}"</p>
                        <p><strong>Notes:</strong> [${data.notes ? data.notes.join(', ') : 'N/A'}]</p>
                        <details>
                            <summary>Full JSON Response</summary>
                            <pre class="result">${result}</pre>
                        </details>
                    `;
                    
                    results.appendChild(div);
                } catch (error) {
                    const div = document.createElement('div');
                    div.className = 'test fail';
                    div.innerHTML = `
                        <h3>❌ Test ${index + 1}: ${test.input} - ERROR</h3>
                        <p>Error: ${error}</p>
                    `;
                    results.appendChild(div);
                }
            });

            // Summary
            const summary = document.createElement('div');
            summary.className = 'test';
            summary.classList.add(passed === total ? 'pass' : 'fail');
            summary.innerHTML = `
                <h2>📊 Summary: ${passed}/${total} tests passed</h2>
                <p><strong>Status:</strong> ${passed === total ? '🎉 ALL TESTS PASSED!' : '⚠️ Some tests failed'}</p>
                <p><strong>Canonical Naming:</strong> ${passed === total ? 'Working correctly ✅' : 'Needs fixing ❌'}</p>
            `;
            results.appendChild(summary);
        }
    </script>
</body>
</html>
