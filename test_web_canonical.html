<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Canonical Test</title>
    <script src="web/chordlock.js"></script>
</head>
<body>
    <h1>Web Canonical Naming Test</h1>
    <div id="results"></div>

    <script>
        ChordlockModule().then(function(Module) {
            // Initialize
            Module.ccall('chordlock_init', null, [], []);
            
            const tests = [
                'CM7',
                'Cmaj7', 
                'C+',
                'Caug',
                'C°',
                'Cdim',
                'CM',
                'Cmaj'
            ];
            
            const results = document.getElementById('results');
            
            tests.forEach(chord => {
                const result = Module.ccall('chordlock_chord_name_to_notes_json', 'string', ['string', 'number'], [chord, 4]);
                const data = JSON.parse(result);
                
                const div = document.createElement('div');
                div.innerHTML = `<strong>${chord}</strong>: chord="${data.chord}" input="${data.input}" found=${data.found}`;
                results.appendChild(div);
                
                console.log(`${chord}:`, data);
            });
        });
    </script>
</body>
</html>
