<!DOCTYPE html>
<html>
<head>
    <title>Test C5, D5, G5 Detection</title>
</head>
<body>
    <h1>Testing C5, D5, G5 (MIDI 72, 74, 79) Detection</h1>
    <div id="results"></div>
    
    <script>
        // Load the WebAsm module
        var Module = {
            onRuntimeInitialized: function() {
                console.log('Chordlock WASM loaded');
                testChord();
            }
        };
        
        function testChord() {
            try {
                // Initialize Chordlock
                Module._chordlock_init();
                
                // Clear all notes first
                Module._chordlock_clear_all_notes();
                
                // Set notes: C5, D5, G5 (MIDI 72, 74, 79)
                Module._chordlock_note_on(72, 80);
                Module._chordlock_note_on(74, 80);
                Module._chordlock_note_on(79, 80);
                
                // Get mask to verify
                var mask = Module._chordlock_get_current_mask();
                console.log('Current mask:', mask, '(0x' + mask.toString(16) + ')');
                
                // Detect chord with basic method
                var result = Module._chordlock_detect_chord();
                var resultStr = UTF8ToString(result);
                console.log('Basic detection result:', resultStr);
                
                // Detect chord with detailed analysis
                var detailedResult = Module._chordlock_detect_chord_detailed(5);
                var detailedResultStr = UTF8ToString(detailedResult);
                console.log('Detailed detection result:', detailedResultStr);
                
                // Display results
                var resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = `
                    <h3>Results:</h3>
                    <p><strong>Pitch Mask:</strong> ${mask} (0x${mask.toString(16)})</p>
                    <h4>Basic Detection:</h4>
                    <pre>${resultStr}</pre>
                    <h4>Detailed Detection:</h4>
                    <pre>${detailedResultStr}</pre>
                `;
                
                // Parse and show chord name
                try {
                    var parsed = JSON.parse(resultStr);
                    document.getElementById('results').innerHTML += `
                        <h4>Detected Chord:</h4>
                        <p><strong>${parsed.chord}</strong> (confidence: ${parsed.confidence})</p>
                    `;
                } catch(e) {
                    console.error('Failed to parse result:', e);
                }
                
            } catch(error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = `<p>Error: ${error}</p>`;
            }
        }

        function UTF8ToString(ptr) {
            var ret = "";
            var c1, c2, c3;
            var ptr1 = ptr;
            while (1) {
                c1 = HEAPU8[ptr1];
                if (c1 == 0) break;
                if (c1 < 128) {
                    ret += String.fromCharCode(c1);
                    ptr1++;
                } else if (c1 > 191 && c1 < 224) {
                    c2 = HEAPU8[ptr1 + 1];
                    ret += String.fromCharCode(((c1 & 31) << 6) | (c2 & 63));
                    ptr1 += 2;
                } else {
                    c2 = HEAPU8[ptr1 + 1];
                    c3 = HEAPU8[ptr1 + 2];
                    ret += String.fromCharCode(((c1 & 15) << 12) | ((c2 & 63) << 6) | (c3 & 63));
                    ptr1 += 3;
                }
            }
            return ret;
        }
    </script>
    
    <script src="demo/chordlock.js"></script>
</body>
</html>
